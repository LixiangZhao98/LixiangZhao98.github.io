immerview:
  abstract: >-
    ImmerView proposes an adaptive multi-view layout for immersive situated visualizations. It places information views near their corresponding objects and adjusts the layout according to spatial relationships, user viewpoint, and visual search needs. The approach aims to improve situatedness and reduce search difficulty when objects are occluded or outside the current view.
  bibtex: |
    @inproceedings{li2023immerview,
      author = {Li, Jiayin and Zhao, Lixiang and Liang, Hai-Ning and Yu, Lingyun},
      title = {ImmerView: Adaptive Multi-View Layout for Immersive Situated Visualizations},
      booktitle = {Proceedings of the IEEE International Symposium on Mixed and Augmented Reality Adjunct},
      year = {2023},
      doi = {10.1109/ISMAR-Adjunct60411.2023.00030}
    }

l-wim:
  abstract: >-
    L-WiM supports collaborative exploration of large-scale immersive environments. It uses linked World-in-Miniature views to show collaborators' relative position, scale, and context, making it easier to maintain awareness across vast astronomical datasets. The design helps users coordinate navigation, share findings, and assist each other across multiple spatial scales.
  bibtex: |
    @inproceedings{zhao2022lwim,
      author = {Zhao, Lixiang and Cao, Nieyu and He, Shuqi and Liang, Hai-Ning and Yu, Lingyun},
      title = {L-WiM: Collaborative Exploration in Immersive Environments},
      booktitle = {Proceedings of the IEEE International Symposium on Mixed and Augmented Reality Adjunct},
      year = {2022},
      doi = {10.1109/ISMAR-Adjunct57072.2022.00031}
    }

ihr:
  abstract: >-
    This study investigates how virtual hand representation affects presence and embodiment in VR. Participants completed tasks using hand representations with different levels of realism, and the study analyzed presence, body ownership, agency, and their relationships. The results indicate that realistic hands can increase presence and body ownership, while agency shows a more nuanced pattern.
  bibtex: |
    @inproceedings{zhang2020handrepresentation,
      author = {Zhang, Jingjing and Huang, Mengjie and Zhao, Lixiang and Yang, Rui and Liang, Hai-Ning and Han, Ji and Wang, Liu and Sun, Wenxin},
      title = {Influence of Hand Representation Design on Presence and Embodiment in Virtual Environment},
      booktitle = {Proceedings of the International Symposium on Computational Intelligence and Design},
      year = {2020},
      doi = {10.1109/ISCID51228.2020.00088}
    }
