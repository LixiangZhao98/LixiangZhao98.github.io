scalefree:
  abstract: >-
    ScaleFree introduces a dynamic KDE approach for exploring multiscale point cloud data in virtual reality. The system supports smooth density estimation across scales so users can inspect sparse and dense structures without repeatedly changing tools or losing spatial context. It is designed for immersive scientific data exploration where users need to move between overview, regional patterns, and fine-grained local structures.
  videos:
    - label: "Video"
      url: "https://www.youtube.com/watch?v=H-dz_4UXMIE"
      embed: "https://www.youtube.com/embed/H-dz_4UXMIE"
  bibtex: |
    @inproceedings{zhao2026scalefree,
      author = {Zhao, Lixiang and Xie, Fuqi and Isenberg, Tobias and Liang, Hai-Ning and Yu, Lingyun},
      title = {ScaleFree: Dynamic KDE for Multiscale Point Cloud Exploration in VR},
      booktitle = {Proceedings of the IEEE Conference on Virtual Reality and 3D User Interfaces},
      pages = {358--368},
      year = {2026},
      doi = {10.1109/VR67842.2026.00057}
    }

mozualization:
  abstract: >-
    Mozualization is a multimodal AI tool for creating and editing music through text, image, and audio inputs. It helps users combine emotional descriptions, visual materials, and sound samples into music with customized style, color, and personal expression. The system explores how multimodal generation can make music composition more accessible while preserving creative control.
  bibtex: |
    @inproceedings{xu2025mozualization,
      author = {Xu, Wanfang and Zhao, Lixiang and Song, Haiwen and Song, Xinheng and Lu, Zhaolin and Liu, Yu and Chen, Min and Lim, Eng Gee and Yu, Lingyun},
      title = {Mozualization: Crafting Music and Visual Representation with Multimodal AI},
      booktitle = {Extended Abstracts of the CHI Conference on Human Factors in Computing Systems},
      year = {2025},
      pages = {1--7},
      doi = {10.1145/3706599.3719686}
    }

3dstoryline:
  abstract: >-
    3DStoryline studies how immersive virtual reality can extend conventional 2D storyline visualizations. The system lets users view, navigate, and interact with 3D storylines from multiple perspectives, helping them understand stories with complex temporal, spatial, and character relationships. A task-based study showed that immersive storyline visualization can improve comprehension of complex narratives.
  bibtex: |
    @article{yao2025threedstoryline,
      author = {Yao, Haonan and Zhao, Lixiang and Chen, Boyuan and Li, Kaiwen and Liang, Hai-Ning and Yu, Lingyun},
      title = {3DStoryline: Immersive Visual Storytelling},
      journal = {Journal of Visualization},
      volume = {28},
      pages = {681--697},
      year = {2025},
      doi = {10.1007/s12650-025-01058-5}
    }

spatialtouch:
  abstract: >-
    SpatialTouch explores spatial data visualization across cross-reality settings. It investigates how users can select, manipulate, and understand spatial data when physical, augmented, and virtual environments are connected. The work focuses on interaction techniques that preserve spatial context while supporting precise exploration of 3D data.
