  </head>

  <body>

      <span class="site-comet site-comet--one"></span>
      <span class="site-comet site-comet--two"></span>
      <span class="site-comet site-comet--three"></span>
      <span class="site-comet site-comet--four"></span>
      <span class="site-comet site-comet--five"></span>
      <span class="site-comet site-comet--six"></span>
      <span class="site-comet site-comet--seven"></span>
      <span class="site-comet site-comet--eight"></span>
      <span class="site-comet site-comet--nine"></span>
      <span class="site-comet site-comet--ten"></span>
      <span class="site-comet site-comet--eleven"></span>
      <span class="site-comet site-comet--twelve"></span>
      <span class="site-comet site-comet--thirteen"></span>
      <span class="site-comet site-comet--fourteen"></span>
      <span class="site-comet site-comet--fifteen"></span>
      <span class="site-comet site-comet--sixteen"></span>
      <span class="site-comet site-comet--seventeen"></span>
      <span class="site-comet site-comet--eighteen"></span>
      <span class="site-comet site-comet--nineteen"></span>
      <span class="site-comet site-comet--twenty"></span>
      <span class="site-comet site-comet--twentyone"></span>
      <span class="site-comet site-comet--twentytwo"></span>
      <span class="site-comet site-comet--twentythree"></span>
      <span class="site-comet site-comet--twentyfour"></span>
      <span class="site-comet site-comet--twentyfive"></span>
      <span class="site-comet site-comet--twentysix"></span>
      <span class="site-comet site-comet--twentyseven"></span>
      <span class="site-comet site-comet--twentyeight"></span>
      <span class="site-comet site-comet--twentynine"></span>
      <span class="site-comet site-comet--thirty"></span>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      (function() {
        var bg = document.querySelector(".site-bg");
        if (!bg || bg.querySelector(".site-star")) return;

        var seed = 17690221;
        var colors = ["255,255,255", "125,211,252", "255,232,184", "196,181,253"];

        function random() {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        }

        for (var i = 0; i < 150; i += 1) {
          var star = document.createElement("span");
          var size = 1 + Math.pow(random(), 1.8) * 2.7;
          var alpha = 0.32 + random() * 0.62;
          star.className = "site-star";
          star.style.setProperty("--star-x", (random() * 100).toFixed(3) + "vw");
          star.style.setProperty("--star-y", (random() * 100).toFixed(3) + "vh");
          star.style.setProperty("--star-size", size.toFixed(2) + "px");
          star.style.setProperty("--star-alpha", alpha.toFixed(2));
          star.style.setProperty("--star-glow", (5 + random() * 18).toFixed(1) + "px");
          star.style.setProperty("--star-duration", (3.8 + random() * 6.8).toFixed(2) + "s");
          star.style.setProperty("--star-delay", (-random() * 7).toFixed(2) + "s");
          star.style.setProperty("--star-color", colors[Math.floor(random() * colors.length)]);
          bg.appendChild(star);
        }
      })();

      document.addEventListener("pointerdown", function(event) {
        if (event.button !== 0 || event.isPrimary === false) return;
        if (event.target.closest("a, button, input, textarea, select, label, [role='button']")) return;

        var angle = 15 + Math.random() * 10;
        var distance = 132 + Math.random() * 86;
        var duration = 1220 + Math.random() * 520;
        var length = 72 + Math.random() * 42;
        var radians = angle * Math.PI / 180;
        var meteor = document.createElement("span");
        meteor.className = "site-click-meteor";
        meteor.style.left = (event.clientX - length) + "px";
        meteor.style.top = event.clientY + "px";
        meteor.style.setProperty("--click-meteor-angle", angle.toFixed(1) + "deg");
        meteor.style.setProperty("--click-meteor-x", Math.cos(radians) * distance + "px");
        meteor.style.setProperty("--click-meteor-y", Math.sin(radians) * distance + "px");
        meteor.style.setProperty("--click-meteor-duration", Math.round(duration) + "ms");
        meteor.style.setProperty("--click-meteor-length", Math.round(length) + "px");
        meteor.style.setProperty("--click-meteor-alpha", (0.72 + Math.random() * 0.18).toFixed(2));
        document.body.appendChild(meteor);

        window.setTimeout(function() {
          meteor.remove();
        }, duration + 180);
      });
    </script>
    <script src="{{ '/assets/js/plane-game.js' | relative_url }}"></script>

  </body>
</html>
