immerview:
  abstract: >-
    Multi-view visualizations play a crucial role in presenting and comparing information within immersive analytics. These views can be positioned at various locations in the immersive environment, with a preference for attaching information close to the actual data, a concept referred to as situated visualization. While existing research has primarily concentrated on the multi-view layout and situated information based on objects' real-world positions, there has been limited exploration of users' subjective preferences for multiple views. These preferences might be influenced by factors such as the user's location, view direction, occlusion in the environment, and also correlate with visualization tasks. This paper introduces a method for developing a flexible layout for multi-view visualizations. This method takes into account the spatial arrangement of objects in relation to the user's position, viewing angle, and the object of focus. With this data, an optimal layout is generated for the views, ensuring that information maintains an equal distance from the user. Consequently, this promotes easier and more user-friendly information comparison, thus enriching the immersive analytics experience.
  bibtex: |
    @inproceedings{li2023immerview,
      author = {Li, Jiayin and Zhao, Lixiang and Liang, Hai-Ning and Yu, Lingyun},
      title = {ImmerView: Adaptive Multi-View Layout for Immersive Situated Visualizations},
      booktitle = {Proceedings of the IEEE International Symposium on Mixed and Augmented Reality Adjunct},
      year = {2023},
      doi = {10.1109/ISMAR-Adjunct60411.2023.00030}
    }

l-wim:
  abstract: >-
    An immersive environment provides multiple users a shared space for collaborative data explorations through head-mounted displays (HMDs). Effective collaboration is built based on different strategies, including the ability to focus on one's own tasks, be aware of others' location, orientation and scale, as well as share data/insights when needed. However, for astronomical data exploration, it might be the case that abundant information is distributed at multiple levels of magnitude. Therefore, it is difficult to observe others' contextual situations and exchange insights efficiently due to the reason that collaborators' avatars may be too far or even in different scales. In this work, we use World-in-Miniature (WiM) to show the virtual environment at the level of each user. Based on that, we propose L-WiM, a novel interactive user interface for collaborative astronomical data exploration that links multiple WiMs. Through L-WiM, collaborators can see their contextual information at a glance, such as the scales, spatial locations, view directions as well as the surrounding environment. Users are supported to communicate via voice messages and visual cues after they select other users' WiMs.
  bibtex: |
    @inproceedings{zhao2022lwim,
      author = {Zhao, Lixiang and Cao, Nieyu and He, Shuqi and Liang, Hai-Ning and Yu, Lingyun},
      title = {L-WiM: Collaborative Exploration in Immersive Environments},
      booktitle = {Proceedings of the IEEE International Symposium on Mixed and Augmented Reality Adjunct},
      year = {2022},
      doi = {10.1109/ISMAR-Adjunct57072.2022.00031}
    }

ihr:
  abstract: >-
    Previous research results have emphasized the influence of avatar representations on user perception in virtual environments, including presence and embodiment. It has been reported that realistic hands present a strong sense of presence and body ownership, while there is a controversy about the sense of agency. This paper investigates the influence of virtual hand representation on user perception and the association between the sense of body ownership and agency. An experiment based on virtual reality was designed with hand representations of different levels of realism to collect users' perception data through questionnaires, and the Spearman correlation was adopted to analyze the relationship between body ownership and agency. The results show that realistic hand induces the higher sense of presence and body ownership, but there is no significant difference in the sense of agency. Moreover, a positive correlation between body ownership and agency in virtual environments was found.
  bibtex: |
    @inproceedings{zhang2020handrepresentation,
      author = {Zhang, Jingjing and Huang, Mengjie and Zhao, Lixiang and Yang, Rui and Liang, Hai-Ning and Han, Ji and Wang, Liu and Sun, Wenxin},
      title = {Influence of Hand Representation Design on Presence and Embodiment in Virtual Environment},
      booktitle = {Proceedings of the International Symposium on Computational Intelligence and Design},
      year = {2020},
      doi = {10.1109/ISCID51228.2020.00088}
    }
